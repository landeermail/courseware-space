name: Validate static site

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - name: Test validator
        run: python3 -m unittest discover -s scripts -p "test_*.py"
      - name: Validate static site
        run: python3 scripts/validate_site.py
