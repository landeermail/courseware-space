<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>物理3D交互课件库</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans SC",sans-serif;background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);min-height:100vh;color:#fff;padding:20px}
.container{max-width:900px;margin:0 auto}
header{text-align:center;padding:40px 0 30px}
header h1{font-size:36px;font-weight:700;margin-bottom:8px;background:linear-gradient(90deg,#667eea,#764ba2);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
header p{color:#a0a0b0;font-size:15px}
.category{margin-bottom:32px}
.category-title{font-size:18px;font-weight:600;color:#667eea;margin-bottom:16px;padding-left:12px;border-left:3px solid #667eea}
.lessons{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px}
.lesson{display:flex;flex-direction:column;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:20px;color:#fff}
.lesson:focus-within{border-color:rgba(102,126,234,0.55);box-shadow:0 0 0 3px rgba(102,126,234,0.12)}
.lesson-header{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.lesson-emoji{font-size:32px;width:48px;height:48px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.08);border-radius:12px}
.lesson-title{font-size:16px;font-weight:600;color:#fff;line-height:1.4}
.lesson-desc{font-size:13px;color:#a0a0b0;line-height:1.6;margin-bottom:16px;flex:1}
.lesson-meta{display:flex;align-items:center;flex-wrap:wrap;gap:8px;font-size:12px;color:#8b9cf6}
.lesson-meta span{background:rgba(102,126,234,0.15);padding:4px 10px;border-radius:20px}
.lesson-entries{display:grid;gap:8px;margin-top:16px;padding-top:16px;border-top:1px solid rgba(255,255,255,0.08)}
.lesson-entry{display:flex;align-items:center;justify-content:space-between;gap:12px;min-height:46px;padding:10px 12px;border:1px solid rgba(102,126,234,0.24);border-radius:11px;background:rgba(102,126,234,0.1);color:#e5e9ff;text-decoration:none;font-size:13px;font-weight:600;line-height:1.45;transition:background .2s,border-color .2s,transform .2s}
.lesson-entry::after{content:'→';flex:none;color:#8b9cf6;font-size:17px}
.lesson-entry:hover{background:rgba(102,126,234,0.2);border-color:rgba(139,156,246,0.6);transform:translateX(2px)}
.lesson-entry:focus-visible{outline:3px solid rgba(139,156,246,0.55);outline-offset:2px}
footer{text-align:center;padding:40px 0 20px;color:#606070;font-size:13px}
@media(max-width:720px){body{padding:12px}header{padding:28px 0 24px}header h1{font-size:24px}header p{font-size:13px}.container{padding:0}.lessons{grid-template-columns:1fr}.lesson{padding:16px}.lesson-emoji{font-size:24px;width:40px;height:40px}.lesson-title{font-size:14px}.lesson-desc{font-size:12px}.lesson-entry{min-height:44px}}
</style>
</head>
<body>
<div class="container">
<header>
<h1>📐 物理3D交互课件库</h1>
<p>电磁感应 · 力学 · 热学 — Three.js 构建 · 拖拽旋转 · 滚轮缩放</p>
</header>

<main id="courseware-list"></main>

<footer>
<p>物理3D交互课件库 · 持续更新中</p>
</footer>
</div>

<script>
// 课件数据 — 现在手写，以后可以改为 fetch('courseware.json')
const coursewareData = {
  "categories": [
    {
      "id": "electromagnetism",
      "name": "⚡ 电磁感应",
      "lessons": [
        {
          "emoji": "✈️",
          "title": "第6题：飞机机翼电势差",
          "desc": "比较不同飞行方向下机翼两端的电势高低，理解速度、磁场与洛伦兹力的空间关系。",
          "tags": ["洛伦兹力", "电势高低"],
          "entries": [
            {
              "title": "逐项判断：四种飞行方向",
              "path": "electromagnetism/q6-plane/"
            },
            {
              "title": "空间推理：速度、磁场与洛伦兹力",
              "path": "mh370-physics/mh370-physics/"
            }
          ]
        },
        {
          "emoji": "🚁",
          "title": "第13题：旋翼感应电动势",
          "desc": "判断旋翼近轴端与叶尖的电势高低，并建立旋转导体动生电动势的积分关系。",
          "tags": ["旋转导体", "动生电动势"],
          "entries": [
            {
              "title": "分步讲解：旋转、受力与积分",
              "path": "electromagnetism/q13-helicopter-physics/"
            },
            {
              "title": "空间推理：叶尖电势与公式",
              "path": "helicopter-dynamics/q13-helicopter/"
            }
          ]
        },
        {
          "emoji": "🔧",
          "title": "第20题：旋转导体与电磁感应",
          "desc": "观察旋转导体、导轨金属棒、安培力与运动状态之间的联动。",
          "tags": ["电磁感应", "安培力", "运动关系"],
          "entries": [
            {
              "title": "联动探究：转动、受力与运动",
              "path": "electromagnetism/q20-rotating-rod/"
            }
          ]
        },
        {
          "emoji": "🧲",
          "title": "第21题：变磁场中的导体棒",
          "desc": "沿完整运动过程理解变磁场、磁通、电流、能量、冲量及 E-x 分段关系。",
          "tags": ["变磁场", "能量与冲量", "E-x关系"],
          "entries": [
            {
              "title": "三问引导：四阶段物理关系",
              "path": "electromagnetism/q21-variable-field-rod/"
            },
            {
              "title": "因果探究：运动、电流与受力",
              "path": "electromagnetism/q21-variable-field-rod-3d/"
            }
          ]
        }
      ]
    }
  ]
};

function renderCourseware() {
  const container = document.getElementById('courseware-list');
  let html = '';
  
  coursewareData.categories.forEach(cat => {
    html += `<div class="category">`;
    html += `<div class="category-title">${cat.name}</div>`;
    html += `<div class="lessons">`;
    
    cat.lessons.forEach(lesson => {
      html += `<article class="lesson">`;
      html += `<div class="lesson-header">`;
      html += `<span class="lesson-emoji">${lesson.emoji}</span>`;
      html += `<h2 class="lesson-title">${lesson.title}</h2>`;
      html += `</div>`;
      html += `<div class="lesson-desc">${lesson.desc}</div>`;
      html += `<div class="lesson-meta">`;
      lesson.tags.forEach(tag => {
        html += `<span>${tag}</span>`;
      });
      html += `</div>`;
      html += `<div class="lesson-entries">`;
      lesson.entries.forEach(entry => {
        html += `<a href="${entry.path}" class="lesson-entry">${entry.title}</a>`;
      });
      html += `</div>`;
      html += `</article>`;
    });
    
    html += `</div></div>`;
  });
  
  container.innerHTML = html;
}

renderCourseware();
</script>
</body>
</html>
